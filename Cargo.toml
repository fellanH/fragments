[package]
name = "fragments"
version = "0.3.0"
edition = "2021"
description = "Sync shared text fragments across files — one primitive, unlimited coverage"

[dependencies]
notify = "7"
notify-debouncer-mini = "0.5"
clap = { version = "4", features = ["derive"] }
walkdir = "2"
anyhow = "1"
serde = { version = "1", features = ["derive"] }
toml = "0.8"

[dev-dependencies]
tempfile = "3"
