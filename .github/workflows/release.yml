name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Release
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write  # required by action-gh-release to create the release and upload assets
    strategy:
      fail-fast: false  # one target failing must not cancel the others' uploads
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package release
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          mkdir -p release
          tar czf release/fragments-${TAG}-${{ matrix.target }}.tar.gz \
            -C target/${{ matrix.target }}/release fragments
        shell: bash

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          files: release/fragments-*-${{ matrix.target }}.tar.gz
